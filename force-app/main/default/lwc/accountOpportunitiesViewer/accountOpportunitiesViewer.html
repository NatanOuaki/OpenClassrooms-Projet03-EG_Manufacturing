<template>
    <lightning-card title="Opportunités du Compte" icon-name="standard:opportunity">
        <div class=slds-max-large-size_xx-large>
            <div class="slds-m-vertical_medium">
                <lightning-button class="slds-m-bottom_small" label="Rafraîchir" onclick={handleRefresh} variant="brand" disabled={isLoading}> </lightning-button>            
            </div>
            
            <template if:true={isLoading}>
                <lightning-spinner size="small" alternative-text="Chargement..."></lightning-spinner>
            </template>
            
            <template if:true={opportunities.length}> <!-- Correction ici - false doit etre true  + Ajout ici - Verification de la longueur du tableau --> 
                <lightning-datatable
                    data={opportunities}
                    columns={columns}
                    key-field="Id">
                </lightning-datatable>
            </template>

            <template if:true={isEmpty}> <!-- Ajout ici - Affichage d'un message lorsque la liste est vide -->
                <div class="slds-text-color_weak slds-m-top_small">
                    Aucune opportunité trouvée pour ce compte.
                </div>
            </template>

            <template if:true={error}>
                <div class="slds-notify slds-notify_alert slds-theme_alert-texture slds-theme_error" role="contentinfo"> <!-- Correction ici - Correction de la classe success par error pour le style d'erreur -->
                    <span class="slds-assistive-text">Erreur</span>
                    <h2>Une erreur s'est produite lors du chargement des opportunités.</h2>
                </div>
            </template>
        </div>
    </lightning-card>
</template>
